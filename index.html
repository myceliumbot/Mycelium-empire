<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1 class="game-title">🐍 SNAKE GAME</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="score-label">Score:</span>
                    <span id="score" class="score-value">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">High Score:</span>
                    <span id="highScore" class="score-value">0</span>
                </div>
            </div>
        </header>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="game-overlay" id="gameOverlay">
                <div class="overlay-content">
                    <h2 id="overlayTitle">Welcome to Snake!</h2>
                    <p id="overlayMessage">Use arrow keys or WASD to move. Eat the food to grow and score points!</p>
                    <button id="startButton" class="game-button">Start Game</button>
                    <button id="restartButton" class="game-button" style="display: none;">Play Again</button>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-info">
                <h3>Controls:</h3>
                <p>🔄 Arrow Keys or WASD to move</p>
                <p>⏸️ Space to pause</p>
                <p>🎯 Eat food to grow and score</p>
            </div>
            <div class="mobile-controls">
                <button id="upBtn" class="control-btn">↑</button>
                <div class="horizontal-controls">
                    <button id="leftBtn" class="control-btn">←</button>
                    <button id="rightBtn" class="control-btn">→</button>
                </div>
                <button id="downBtn" class="control-btn">↓</button>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
